name: Update item & currency data

# Keeps public/items.json.gz and public/currencies/* current with new FFXIV items and
# currencies — no app rebuild needed. Runs weekly, and can be triggered by hand from the
# Actions tab (workflow_dispatch).

on:
  schedule:
    - cron: '0 6 * * 1'        # every Monday 06:00 UTC
  workflow_dispatch: {}         # manual "Run workflow" button

permissions:
  contents: write               # allows the bot commit below (uses the built-in GITHUB_TOKEN)

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Regenerate item + currency data
        run: |
          node scripts/build-items.mjs        # writes public/items.json.gz
          node scripts/build-currencies.mjs   # reads items.json.gz, writes public/currencies/*

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain public/items.json.gz public/currencies)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/items.json.gz public/currencies
            git commit -m "chore: refresh item + currency data ($(date -u +%Y-%m-%d))"
            git push
            echo "Item/currency data updated."
          else
            echo "No changes to item/currency data."
          fi
